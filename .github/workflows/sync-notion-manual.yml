name: Sync Notion Content (Manual)

on:
  workflow_dispatch:
    inputs:
      full_sync:
        description: "전체 동기화 여부 (기본값: edit 체크된 글만)"
        required: false
        type: boolean
        default: false

jobs:
  sync-notion:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Sync from Notion
        timeout-minutes: 20
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_EDIT_PROPERTY: edit
        run: |
          if [ "${{ inputs.full_sync }}" = "true" ]; then
            npm run sync:notion:all
          else
            npm run sync:notion:edited
          fi

      - name: Commit and push synced content
        run: |
          git config --local user.email "hanmw110@naver.com"
          git config --local user.name "manNomi"
          git add src/content/blog/ public/images/ .notion-sync-manifest.json
          git diff --staged --quiet || (git commit -m "chore: sync content from Notion [skip ci]" && git push)

<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BusLive Portfolio Demo</title>
    <style>
      :root {
        --ink: #172331;
        --muted: #667281;
        --navy: #26394b;
        --green: #24a957;
        --green-dark: #12773e;
        --yellow: #ffe600;
        --paper: #ffffff;
        --line: #e4ebef;
        --danger: #ff8f3d;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
      }

      body {
        margin: 0;
        color: var(--ink);
        background:
          linear-gradient(90deg, rgba(38, 57, 75, 0.06) 1px, transparent 1px),
          linear-gradient(rgba(38, 57, 75, 0.06) 1px, transparent 1px),
          #eef3ec;
        background-size: 36px 36px;
        font-family:
          Pretendard, Inter, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      .stage {
        display: grid;
        place-items: center;
        min-height: 100%;
        padding: 18px;
      }

      .app-screen {
        position: relative;
        width: min(100vw, 430px);
        height: min(100vh, 932px);
        min-height: 720px;
        overflow: hidden;
        border-radius: 0;
        background: #f5f8f2;
        box-shadow: 0 28px 70px rgba(23, 35, 49, 0.22);
      }

      @media (max-width: 520px) {
        .stage {
          padding: 0;
        }

        .app-screen {
          width: 100vw;
          height: 100vh;
          min-height: 100vh;
          box-shadow: none;
        }
      }

      .statusbar {
        position: absolute;
        inset: 0 0 auto;
        z-index: 50;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 30px;
        padding: 0 18px;
        color: #111111;
        font-size: 11px;
        font-weight: 900;
        pointer-events: none;
      }

      .status-right {
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .battery {
        position: relative;
        width: 22px;
        height: 10px;
        border: 2px solid currentColor;
        border-radius: 3px;
      }

      .battery::after {
        content: "";
        position: absolute;
        top: 1px;
        right: -5px;
        width: 2px;
        height: 6px;
        border-radius: 1px;
        background: currentColor;
      }

      .app-header {
        position: absolute;
        top: 36px;
        left: 12px;
        right: 12px;
        z-index: 40;
        display: grid;
        grid-template-columns: 46px 1fr 46px;
        align-items: center;
        min-height: 54px;
        padding: 0 10px;
        border: 1px solid rgba(23, 35, 49, 0.12);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 12px 28px rgba(23, 35, 49, 0.14);
        backdrop-filter: blur(10px);
      }

      .icon-button {
        display: grid;
        place-items: center;
        width: 38px;
        height: 38px;
        border-radius: 8px;
        color: var(--ink);
        background: #edf3f6;
        font-size: 22px;
        font-weight: 950;
      }

      .header-title {
        display: grid;
        gap: 2px;
        text-align: center;
      }

      .header-title strong {
        color: #111111;
        font-size: 20px;
        font-weight: 950;
        line-height: 1;
      }

      .header-title span {
        color: var(--muted);
        font-size: 11px;
        font-weight: 900;
        line-height: 1.15;
      }

      .live-pill {
        position: absolute;
        top: 102px;
        left: 14px;
        z-index: 25;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        min-height: 32px;
        padding: 0 10px;
        border-radius: 8px;
        color: var(--green-dark);
        background: rgba(255, 255, 255, 0.92);
        font-size: 12px;
        font-weight: 950;
        box-shadow: 0 10px 24px rgba(23, 35, 49, 0.12);
      }

      .live-pill::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 0 5px rgba(36, 169, 87, 0.16);
      }

      .eta-card {
        position: absolute;
        left: 14px;
        right: 14px;
        bottom: 20px;
        z-index: 20;
        padding: 14px;
        border: 1px solid rgba(23, 35, 49, 0.12);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.95);
        box-shadow: 0 18px 42px rgba(23, 35, 49, 0.18);
        transition: bottom 240ms ease;
      }

      .eta-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .route-badge {
        display: grid;
        place-items: center;
        min-width: 58px;
        height: 40px;
        border-radius: 8px;
        color: #ffffff;
        background: var(--green);
        font-size: 21px;
        font-weight: 950;
      }

      .accuracy {
        color: var(--green-dark);
        font-size: 12px;
        font-weight: 950;
      }

      .eta-time {
        margin-top: 8px;
        color: var(--ink);
        font-size: 42px;
        font-weight: 950;
        line-height: 1;
        letter-spacing: 0;
      }

      .eta-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        align-items: center;
        gap: 4px;
        margin-top: 8px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 850;
        line-height: 1.25;
      }

      .eta-row strong {
        color: var(--ink);
        font-size: 12px;
        white-space: nowrap;
      }

      .eta-row span {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .progress-track {
        height: 8px;
        margin-top: 12px;
        overflow: hidden;
        border-radius: 8px;
        background: #edf2ee;
      }

      .progress-fill {
        width: 0%;
        height: 100%;
        border-radius: 8px;
        background: var(--green);
        transition: width 120ms linear;
      }

      .chat-panel {
        position: absolute;
        left: 14px;
        right: 14px;
        bottom: 260px;
        z-index: 34;
        display: none;
        overflow: hidden;
        border: 1px solid rgba(23, 35, 49, 0.1);
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 22px 56px rgba(23, 35, 49, 0.22);
        transition: bottom 240ms ease;
      }

      .chat-panel.open {
        display: block;
        animation: slide-up 220ms ease both;
      }

      @keyframes slide-up {
        from {
          opacity: 0;
          transform: translateY(16px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .panel-head {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto 34px;
        align-items: center;
        gap: 8px;
        min-height: 44px;
        padding: 0 12px;
        color: #ffffff;
        background: var(--navy);
        font-size: 13px;
        font-weight: 950;
      }

      .panel-head span,
      .panel-head strong {
        color: #ffffff;
      }

      .panel-head strong {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .panel-close {
        display: grid;
        place-items: center;
        width: 28px;
        height: 28px;
        border-radius: 6px;
        color: #ffffff;
        background: rgba(255, 255, 255, 0.16);
        font-size: 18px;
        font-weight: 950;
        line-height: 1;
      }

      .message-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-height: 188px;
        overflow: auto;
        padding: 12px;
        background:
          linear-gradient(90deg, rgba(23, 35, 49, 0.04) 1px, transparent 1px),
          linear-gradient(rgba(23, 35, 49, 0.04) 1px, transparent 1px),
          #f8faf8;
        background-size: 28px 28px;
      }

      .message {
        max-width: 82%;
        padding: 9px 10px;
        border-radius: 8px;
        color: var(--ink);
        background: #ffffff;
        box-shadow: 0 6px 16px rgba(23, 35, 49, 0.08);
        font-size: 12px;
        font-weight: 750;
        line-height: 1.42;
      }

      .message strong {
        display: block;
        margin-bottom: 3px;
        color: var(--green-dark);
        font-size: 11px;
        font-weight: 950;
      }

      .message.mine {
        align-self: flex-end;
        background: var(--yellow);
      }

      .chat-form {
        display: grid;
        grid-template-columns: 1fr 54px;
        gap: 8px;
        padding: 10px;
        border-top: 1px solid var(--line);
        background: #ffffff;
      }

      .chat-form input {
        min-width: 0;
        height: 42px;
        padding: 0 11px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--ink);
        background: #ffffff;
        font-size: 12px;
        font-weight: 800;
        outline: none;
      }

      .chat-form input:focus {
        border-color: var(--green);
        box-shadow: 0 0 0 4px rgba(36, 169, 87, 0.14);
      }

      .chat-form button {
        border-radius: 8px;
        color: #ffffff;
        background: var(--green);
        font-size: 12px;
        font-weight: 950;
      }

      .aside {
        position: absolute;
        top: 100px;
        left: 12px;
        z-index: 45;
        display: none;
        width: 176px;
        padding: 10px;
        border: 1px solid rgba(23, 35, 49, 0.1);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.95);
        box-shadow: 0 18px 38px rgba(23, 35, 49, 0.2);
      }

      .aside.open {
        display: grid;
        gap: 8px;
      }

      .aside-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 34px;
        padding: 0 9px;
        border-radius: 8px;
        color: var(--ink);
        background: #f1f5f2;
        font-size: 12px;
        font-weight: 900;
      }

      .aside-row.active {
        color: #ffffff;
        background: var(--navy);
      }

      .chat-list-page,
      .onboarding {
        position: absolute;
        inset: 0;
        z-index: 60;
        display: none;
        background: #ffffff;
      }

      .chat-list-page.open,
      .onboarding.open {
        display: block;
      }

      .simple-header {
        display: grid;
        grid-template-columns: 54px 1fr 110px;
        align-items: center;
        height: 58px;
        margin-top: 30px;
        border-bottom: 2px solid #111111;
        background: #ffffff;
      }

      .back-button {
        display: grid;
        place-items: center;
        color: #111111;
        background: transparent;
        font-size: 38px;
        font-weight: 950;
      }

      .simple-header strong,
      .simple-header span {
        color: #111111;
        font-size: 17px;
        font-weight: 950;
        text-align: center;
      }

      .chat-room-list {
        display: grid;
      }

      .chat-room {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        min-height: 82px;
        padding: 0 16px;
        border-bottom: 1px solid var(--line);
        background: #ffffff;
        text-align: left;
      }

      .chat-room strong {
        display: block;
        color: #333333;
        font-size: 20px;
        font-weight: 950;
      }

      .chat-room span {
        display: block;
        margin-top: 6px;
        color: #666666;
        font-size: 13px;
        font-weight: 800;
      }

      .chat-room em {
        color: #888888;
        font-size: 12px;
        font-style: normal;
        font-weight: 900;
      }

      .onboarding {
        color: #ffffff;
        background: var(--navy);
      }

      .onboarding-content {
        display: grid;
        grid-template-rows: 1fr auto;
        height: 100%;
        padding: 72px 24px 30px;
      }

      .onboarding-title {
        display: grid;
        align-content: center;
        gap: 18px;
      }

      .onboarding-title h1 {
        margin: 0;
        color: #ffffff;
        font-size: 44px;
        font-weight: 950;
        line-height: 0.95;
      }

      .onboarding-title p {
        margin: 0;
        color: rgba(255, 255, 255, 0.78);
        font-size: 15px;
        font-weight: 750;
        line-height: 1.55;
      }

      .onboarding-actions {
        display: grid;
        gap: 10px;
      }

      .onboarding-button {
        min-height: 54px;
        border-radius: 8px;
        color: var(--ink);
        background: #ffffff;
        font-size: 16px;
        font-weight: 950;
      }

      .onboarding-button.primary {
        background: var(--yellow);
      }

      .map {
        position: absolute;
        inset: 0;
        overflow: hidden;
        cursor: grab;
        touch-action: none;
        background: #eef3f6 !important;
      }

      .map.dragging {
        cursor: grabbing;
      }

      .tile-layer,
      .geo-route-layer,
      .station-layer,
      .stop-info-layer,
      .bus-layer {
        position: absolute;
        inset: 0;
      }

      .tile-layer {
        z-index: 1;
      }

      .osm-tile {
        position: absolute;
        width: 256px;
        height: 256px;
        user-select: none;
        -webkit-user-drag: none;
      }

      .geo-route-layer {
        z-index: 4;
        overflow: visible;
        pointer-events: none;
      }

      .geo-route-shadow,
      .geo-route-line,
      .geo-route-dash {
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
        vector-effect: non-scaling-stroke;
      }

      .geo-route-shadow {
        stroke: rgba(255, 255, 255, 0.9);
        stroke-width: 11;
      }

      .geo-route-line {
        stroke: rgba(36, 169, 87, 0.9);
        stroke-width: 6;
      }

      .geo-route-dash {
        stroke: rgba(255, 255, 255, 0.92);
        stroke-width: 2;
        stroke-dasharray: 10 9;
      }

      .station-layer {
        z-index: 10;
        pointer-events: none;
      }

      .geo-station-pin {
        position: absolute;
        display: grid;
        place-items: center;
        width: 18px;
        height: 18px;
        border: 2px solid #111111;
        border-radius: 50% 50% 50% 0;
        background: #ffffff;
        box-shadow: 0 5px 12px rgba(23, 35, 49, 0.22);
        pointer-events: auto;
        transform: translate(-50%, -100%) rotate(-45deg);
      }

      .geo-station-pin.active {
        background: var(--yellow);
      }

      .geo-station-pin::after {
        content: "";
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: #111111;
      }

      .geo-station-pin span {
        position: absolute;
        left: 15px;
        top: 14px;
        min-width: 94px;
        transform: rotate(45deg);
        color: #172331;
        font-size: 10px;
        font-weight: 950;
        line-height: 1.15;
        text-align: left;
        text-shadow:
          0 1px 0 #ffffff,
          0 -1px 0 #ffffff,
          1px 0 0 #ffffff,
          -1px 0 0 #ffffff;
      }

      .bus-layer {
        z-index: 16;
        pointer-events: none;
      }

      .bus-fleet-marker {
        position: absolute;
        display: grid;
        place-items: center;
        width: 44px;
        height: 44px;
        padding: 0;
        border: 0;
        background: transparent;
        pointer-events: auto;
        transform: translate(-50%, -50%);
        transition:
          left 500ms linear,
          top 500ms linear;
        will-change: left, top;
      }

      .bus-fleet-marker.closest {
        width: 52px;
        height: 52px;
        z-index: 2;
      }

      .bus-fleet-marker img {
        display: block;
        width: 36px;
        height: 36px;
        object-fit: contain;
        filter: drop-shadow(0 12px 13px rgba(23, 35, 49, 0.28));
      }

      .bus-fleet-marker.closest img {
        width: 44px;
        height: 44px;
        filter:
          drop-shadow(0 0 0 rgba(36, 169, 87, 0.9))
          drop-shadow(0 16px 18px rgba(23, 35, 49, 0.32));
      }

      .bus-state-dot {
        position: absolute;
        right: 4px;
        bottom: 5px;
        width: 11px;
        height: 11px;
        border: 2px solid #ffffff;
        border-radius: 50%;
        background: #31511e;
        box-shadow: 0 4px 8px rgba(23, 35, 49, 0.18);
      }

      .bus-fleet-marker.congestion-1 .bus-state-dot {
        background: #e44343;
      }

      .bus-fleet-marker.congestion-2 .bus-state-dot,
      .bus-fleet-marker.last .bus-state-dot {
        background: #e6c767;
      }

      .stop-info-layer {
        z-index: 28;
        pointer-events: none;
      }

      .stop-info-card {
        position: absolute;
        min-width: 180px;
        padding: 12px 16px;
        border: 1px solid rgba(0, 0, 0, 0.2);
        border-radius: 10px;
        background: #ffffff;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        color: #111111;
        pointer-events: auto;
        transform: translate(-50%, -110%);
      }

      .stop-info-head {
        position: relative;
        min-height: 18px;
        margin-bottom: 5px;
      }

      .stop-info-close {
        position: absolute;
        top: -4px;
        right: -8px;
        display: grid;
        place-items: center;
        width: 28px;
        height: 28px;
        color: #111111;
        background: transparent;
        font-size: 14px;
        font-weight: 950;
      }

      .stop-info-body {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
      }

      .stop-info-label {
        margin-bottom: 2px;
        color: #333333;
        font-size: 12px;
      }

      .stop-info-value {
        width: 100%;
        color: #111111;
        font-size: 15px;
        font-weight: 950;
        text-align: left;
      }

      .stop-chat-button {
        width: 100%;
        min-height: 38px;
        margin-top: 8px;
        border-radius: 8px;
        color: #ffffff;
        background: var(--green);
        font-size: 13px;
        font-weight: 950;
      }

      .map-meta {
        position: absolute;
        left: 8px;
        bottom: 178px;
        z-index: 18;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        min-height: 26px;
        padding: 0 8px;
        border-radius: 8px;
        color: #2b3c4e;
        background: rgba(255, 255, 255, 0.9);
        font-size: 10px;
        font-weight: 900;
        box-shadow: 0 8px 18px rgba(23, 35, 49, 0.1);
      }

      .osm-attribution {
        position: absolute;
        right: 8px;
        bottom: 178px;
        z-index: 18;
        padding: 4px 6px;
        border-radius: 6px;
        color: #4b5563;
        background: rgba(255, 255, 255, 0.86);
        font-size: 9px;
        font-weight: 800;
      }

      .zoom-controls {
        position: absolute;
        left: 14px;
        top: 148px;
        z-index: 55;
        display: grid;
        overflow: hidden;
        border: 1px solid rgba(23, 35, 49, 0.12);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 12px 28px rgba(23, 35, 49, 0.14);
      }

      .zoom-button {
        display: grid;
        place-items: center;
        width: 42px;
        height: 38px;
        color: var(--ink);
        background: #ffffff;
        font-size: 22px;
        font-weight: 950;
      }

      .zoom-button + .zoom-button {
        border-top: 1px solid var(--line);
      }

      .zoom-button:disabled {
        color: #a7b0b7;
        cursor: not-allowed;
      }

      .chat-panel {
        bottom: 228px;
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <section class="app-screen" id="appScreen" aria-label="BusLive mobile demo">
        <div class="map" id="mapCanvas" aria-label="OpenStreetMap 기반 511번 실시간 지도">
          <div class="tile-layer" id="tileLayer"></div>
          <svg class="geo-route-layer" id="geoRouteLayer" preserveAspectRatio="none">
            <polyline id="geoRouteShadow" class="geo-route-shadow" />
            <polyline id="geoRouteBase" class="geo-route-line" />
            <polyline id="geoRouteDash" class="geo-route-dash" />
          </svg>
          <div class="station-layer" id="stationLayer"></div>
          <div class="stop-info-layer" id="stopInfoLayer"></div>
          <div class="bus-layer" id="busLayer"></div>
          <div class="map-meta" id="mapMeta">노드 63개 · 버스 6대 · 10m/s</div>
          <div class="osm-attribution">© OpenStreetMap</div>
          <div class="zoom-controls" aria-label="지도 확대 축소">
            <button class="zoom-button" id="zoomInButton" type="button" aria-label="지도 확대">
              +
            </button>
            <button class="zoom-button" id="zoomOutButton" type="button" aria-label="지도 축소">
              −
            </button>
          </div>
        </div>
        <div class="statusbar">
          <span>9:41</span>
          <span class="status-right">LTE <span class="battery"></span></span>
        </div>

        <header class="app-header">
          <button class="icon-button" id="asideButton" aria-label="옵션 열기">⋯</button>
          <div class="header-title">
            <strong>511 BUSLIVE</strong>
            <span id="headerSubtitle">인하대후문 방향</span>
          </div>
          <button class="icon-button" id="chatListButton" aria-label="채팅 목록">≡</button>
        </header>

        <div class="live-pill" id="livePill">LIVE 이동 중</div>

        <aside class="aside" id="aside">
          <button class="aside-row active" type="button"><span>노드</span><strong>ON</strong></button>
          <button class="aside-row" id="asideChatButton" type="button"><span>채팅방</span><strong>›</strong></button>

      const formatEta = (seconds) => {
        const minutes = Math.floor(seconds / 60);
        const rest = Math.max(0, Math.round(seconds % 60));
        if (minutes <= 0) return rest + "초";
        return minutes + "분 " + String(rest).padStart(2, "0") + "초";
      };

      const toRadians = (degree) => (degree * Math.PI) / 180;

      const getDistanceInMeters = (lat1, lng1, lat2, lng2) => {
        const radius = 6371000;
        const dLat = toRadians(lat2 - lat1);
        const dLng = toRadians(lng2 - lng1);
        const a =
          Math.sin(dLat / 2) * Math.sin(dLat / 2) +
          Math.cos(toRadians(lat1)) *
            Math.cos(toRadians(lat2)) *
            Math.sin(dLng / 2) *
            Math.sin(dLng / 2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        return radius * c;
      };

      const latLngToWorld = ({ lat, lng }, zoom = mapZoom) => {
        const scale = TILE_SIZE * 2 ** zoom;
        const sinLat = Math.sin(toRadians(lat));
        return {
          x: ((lng + 180) / 360) * scale,
          y:
            (0.5 - Math.log((1 + sinLat) / (1 - sinLat)) / (4 * Math.PI)) *
            scale,
        };
      };

      const worldToLatLng = ({ x, y }, zoom = mapZoom) => {
        const scale = TILE_SIZE * 2 ** zoom;
        const lng = (x / scale) * 360 - 180;
        const n = Math.PI - (2 * Math.PI * y) / scale;
        const lat = (180 / Math.PI) * Math.atan(0.5 * (Math.exp(n) - Math.exp(-n)));
        return { lat, lng };
      };

        const rect = mapCanvas.getBoundingClientRect();
        const center = latLngToWorld(mapCenter);
        const startX = Math.floor((center.x - rect.width / 2) / TILE_SIZE);
        const endX = Math.floor((center.x + rect.width / 2) / TILE_SIZE);
        const startY = Math.floor((center.y - rect.height / 2) / TILE_SIZE);
        const endY = Math.floor((center.y + rect.height / 2) / TILE_SIZE);
        const tiles = [];

        for (let x = startX - 1; x <= endX + 1; x += 1) {
          for (let y = startY - 1; y <= endY + 1; y += 1) {
            tiles.push(
              '<img class="osm-tile" alt="" src="https://tile.openstreetmap.org/' +
                mapZoom +
                '/' +
                x +
                '/' +
                y +
                '.png" style="left:' +
                (x * TILE_SIZE - center.x + rect.width / 2) +
                'px; top:' +
                (y * TILE_SIZE - center.y + rect.height / 2) +
                'px" />'
            );
          }
        }

        tileLayer.innerHTML = tiles.join("");
      };

      const renderRoute = () => {
        const rect = mapCanvas.getBoundingClientRect();
        const points = NODE_LOCATION.map(project)
          .map((point) => point.x.toFixed(1) + "," + point.y.toFixed(1))
          .join(" ");
        geoRouteLayer.setAttribute("viewBox", "0 0 " + rect.width + " " + rect.height);
        geoRouteShadow.setAttribute("points", points);
        geoRouteBase.setAttribute("points", points);
        geoRouteDash.setAttribute("points", points);
      };

      const getBusFill = (bus) => {
        if (bus.lastbusyn === 1) return "#E6C767";
        if (bus.congestion === 1) return "#e44343";
        if (bus.congestion === 2) return "#E6C767";
        return "#31511E";
      };

      const renderBusIcon = (bus) =>
        '<img src="' +
        BUS_ICON_DATA_URL +
        '" alt="" />' +
        '<span class="bus-state-dot" aria-hidden="true"></span>';

      const getClosestBusLocation = () => {
        const candidates = displayBusPoints.filter(
          (item) => Number(item.lastNode) < Number(selectedStop.lastNode)
        );
        if (candidates.length === 0) return displayBusPoints[0] || null;
        candidates.sort((a, b) => Number(b.lastNode) - Number(a.lastNode));
        return candidates[0];
      };

      const estimateDistanceToStop = (bus) => {
        if (!bus || !selectedStop) return 0;
        const currentLastNode = Number(bus.lastNode);
        const stopNode = Number(selectedStop.lastNode);
        if (currentLastNode >= stopNode) return 0;

        let total = 0;
        const nextNode = NODE_LOCATION.find((node) => node.lastNode === currentLastNode + 1);
        if (nextNode) {
          total += getDistanceInMeters(bus.lat, bus.lng, nextNode.lat, nextNode.lng);
        }

        for (let node = currentLastNode + 1; node < stopNode; node += 1) {
          const from = NODE_LOCATION.find((item) => item.lastNode === node);
          const to = NODE_LOCATION.find((item) => item.lastNode === node + 1);
          if (from && to) {
            total += getDistanceInMeters(from.lat, from.lng, to.lat, to.lng);
          }
        }

        return total;
      };

      const renderStations = () => {
        stationLayer.innerHTML = BUS_STOP_LOCATION.map((stop) => {
          const point = project(stop.busPoint);
          const active = stop.busStopId === selectedStop.busStopId;
          return (
            '<button class="geo-station-pin ' +
            (active ? "active" : "") +
            '" data-stop-id="' +
            stop.busStopId +
            '" type="button" style="left:' +
            point.x +
            'px; top:' +
            point.y +
            'px" aria-label="' +
            stop.busStop +
            '"><span>' +
            stop.busStop +
            '</span></button>'
          );
        }).join("");

        stationLayer.querySelectorAll(".geo-station-pin").forEach((button) => {
          button.addEventListener("click", () => {
            selectedStop =
              BUS_STOP_LOCATION.find((stop) => stop.busStopId === button.dataset.stopId) ||
              selectedStop;
            selectedStopInfo = selectedStop;
            renderMapOverlays();
            renderEta();
          });
        });
      };

      const renderStopInfo = () => {
        if (!selectedStopInfo) {
          stopInfoLayer.innerHTML = "";
          return;
        }

        const point = project({
          lat: selectedStopInfo.busPoint.lat + 0.001,
          lng: selectedStopInfo.busPoint.lng,
        });

        stopInfoLayer.innerHTML =
          '<section class="stop-info-card" style="left:' +
          point.x +
          "px; top:" +
          point.y +
          'px" aria-label="' +
          selectedStopInfo.busStop +
          ' 정류장 정보">' +
          '<div class="stop-info-head">' +
          '<button class="stop-info-close" id="closeStopInfoButton" type="button" aria-label="정류장 정보 닫기">✖</button>' +
          "</div>" +
          '<div class="stop-info-body">' +
          '<div><div class="stop-info-label">정류장</div><div class="stop-info-value">' +
          selectedStopInfo.busStop +
          "</div></div>" +
          '<div><div class="stop-info-label">정류장ID</div><div class="stop-info-value">' +
          selectedStopInfo.busStopId +
          "</div></div>" +
          '<div><div class="stop-info-label">위도</div><div class="stop-info-value">' +
          selectedStopInfo.busPoint.lat +
          "</div></div>" +
          '<div><div class="stop-info-label">경도</div><div class="stop-info-value">' +
          selectedStopInfo.busPoint.lng +
          "</div></div>" +
          '<button class="stop-chat-button" id="enterStopChatButton" type="button">' +
          selectedStopInfo.busStop +
          " 채팅방 입장</button>" +
          "</div>" +
          "</section>";

        document.querySelector("#closeStopInfoButton").addEventListener("click", () => {
          selectedStopInfo = null;
          renderStopInfo();
        });
        document.querySelector("#enterStopChatButton").addEventListener("click", () => {
          openStationChat(selectedStopInfo);
        });
      };

      const renderBuses = () => {
        const closestBus = getClosestBusLocation();
        busLayer.innerHTML = displayBusPoints
          .map((bus, index) => {
            const point = project(bus);
            const isClosest = closestBus === bus;
            const classes = [
              "bus-fleet-marker",
              "congestion-" + bus.congestion,
              isClosest ? "closest" : "",
              bus.lastbusyn === 1 ? "last" : "",
            ]
              .filter(Boolean)
              .join(" ");
            return (
              '<button class="' +
              classes +
              '" data-bus-index="' +
              index +
              '" type="button" style="left:' +
              point.x +
              'px; top:' +
              point.y +
              'px" aria-label="511번 버스 ' +
              (index + 1) +
              '">' +
              renderBusIcon(bus) +
              '</button>'
            );
          })
          .join("");
      };

      const renderMapOverlays = () => {
        renderRoute();
        renderStations();
        renderStopInfo();
        renderBuses();
      };

      const renderEta = () => {
        const closestBus = getClosestBusLocation();
        const distanceMeters = estimateDistanceToStop(closestBus);
        const etaSeconds = Math.max(10, distanceMeters / BUS_SPEED_MPS);
        const nodesAway = closestBus
          ? Math.max(0, Number(selectedStop.lastNode) - Number(closestBus.lastNode))
          : 0;
        const progress = closestBus
          ? Math.min(100, (Number(closestBus.lastNode) / Number(selectedStop.lastNode)) * 100)
          : 0;

        etaTime.textContent = formatEta(etaSeconds);
        etaStation.textContent = selectedStop.busStop + " 도착 예정";
        etaDistance.textContent = nodesAway + "노드";
        headerSubtitle.textContent = stationDirections[selectedStop.busStop] || selectedStop.busStop + " 방향";
        chatRoomName.textContent = selectedStop.busStop + " 채팅";
        progressFill.style.width = progress + "%";
        livePill.textContent = "LIVE " + displayBusPoints.length + "대 이동 중";
        mapMeta.textContent = "노드 " + NODE_LOCATION.length + "개 · 정류장 " + BUS_STOP_LOCATION.length + "개 · " + BUS_SPEED_MPS + "m/s";
      };

      const moveDisplayBusPoints = () => {
        displayBusPoints = displayBusPoints.map((busLocation) => {
          const nextNode = NODE_LOCATION.find(
            (node) => node.lastNode === Number(busLocation.lastNode) + 1
          );

          if (!nextNode) {
            const firstNode = NODE_LOCATION[0];
            return {
              ...busLocation,
              lastNode: firstNode.lastNode,
              lat: firstNode.lat,
              lng: firstNode.lng,
            };
          }

          const distance = getDistanceInMeters(
            nextNode.lat,
            nextNode.lng,
            busLocation.lat,
            busLocation.lng
          );

          if (distance < 5) {
            return {
              ...busLocation,
              lat: nextNode.lat,
              lng: nextNode.lng,
            };
          }

          const step = Math.min(
            1,
            (BUS_SPEED_MPS * (MOVEMENT_INTERVAL_MS / 1000)) / distance
          );

          return {
            ...busLocation,
            lat: busLocation.lat + (nextNode.lat - busLocation.lat) * step,
            lng: busLocation.lng + (nextNode.lng - busLocation.lng) * step,
          };
        });

        renderBuses();
        renderEta();
      };

      const advanceMockBusNodes = () => {
        const updateCounts = [1, 2, 4];
        const updateCount = updateCounts[pollCycle % updateCounts.length];
        const startIndex = pollCycle % serverBusData.length;
        const indices = Array.from({ length: updateCount }, (_, offset) =>
          (startIndex + offset) % serverBusData.length
        );

        serverBusData = serverBusData.map((bus, index) => {
          if (!indices.includes(index)) return bus;
          const nextLastNode = Number(bus.lastNode) + 1;
          const nextNode =
            NODE_LOCATION.find((node) => node.lastNode === nextLastNode) || NODE_LOCATION[0];
          return {
            ...bus,
            lastNode: nextNode.lastNode,
            lat: nextNode.lat,
            lng: nextNode.lng,
          };
        });

        displayBusPoints = displayBusPoints.map((displayBus, index) => {
          const newBus = serverBusData[index];
          if (!newBus) return displayBus;
          if (Number(displayBus.lastNode) !== Number(newBus.lastNode)) {
            return { ...displayBus, ...newBus };
          }
          return displayBus;
        });

        pollCycle += 1;
        renderBuses();
        renderEta();
      };

      const renderMessages = () => {
        messageList.innerHTML = messages
          .map(
            (message) =>
              '<div class="message ' +
              (message.mine ? "mine" : "") +
              '">' +
              (message.mine ? "" : "<strong>" + message.nickname + "</strong>") +
              message.text +
              "</div>"
          )
          .join("");
        messageCount.textContent = String(messages.length);
        messageList.scrollTop = messageList.scrollHeight;
      };

      const addIncomingMessage = () => {
        messages = [
          ...messages,
          {
            nickname: selectedStop.busStop,
            text: incomingMessages[messageIndex % incomingMessages.length],
          },
        ].slice(-7);
        messageIndex += 1;
        renderMessages();
      };

      const setDemoRoute = (route) => {
        if (window.location.hash !== route) {
          window.history.replaceState(null, "", route);
        }
      };

      const openStationChat = (stop) => {
        if (stop) {
          selectedStop = stop;
          selectedStopInfo = null;
        }
        setDemoRoute("#/chat/" + encodeURIComponent(selectedStop.busStop));
        renderMapOverlays();
        renderEta();
        chatPanel.classList.add("open");
        addIncomingMessage();
      };

      const closeChat = () => {
        chatPanel.classList.remove("open");
        setDemoRoute("#/map");
      };

      const openChatList = () => {
        setDemoRoute("#/chatList");
        chatListPage.classList.add("open");
        chatPanel.classList.remove("open");
      };

      const closeChatList = () => {
        chatListPage.classList.remove("open");
        setDemoRoute("#/map");
      };

      const resizeMap = () => {
        renderTiles();
        renderMapOverlays();
        renderEta();
        zoomInButton.disabled = mapZoom >= MAX_MAP_ZOOM;
        zoomOutButton.disabled = mapZoom <= MIN_MAP_ZOOM;
      };

      const changeMapZoom = (delta) => {
        const nextZoom = Math.max(MIN_MAP_ZOOM, Math.min(MAX_MAP_ZOOM, mapZoom + delta));
        if (nextZoom === mapZoom) return;
        mapZoom = nextZoom;
        resizeMap();
      };

      const shouldSkipMapDrag = (target) =>
        Boolean(
          target.closest(
            "button, input, .eta-card, .chat-panel, .chat-list-page, .onboarding, .app-header, .aside, .stop-info-card, .zoom-controls"
          )
        );

      const startMapDrag = (event) => {
        if (shouldSkipMapDrag(event.target)) return;
        isMapDragging = true;
        dragStart = {
          x: event.clientX,
          y: event.clientY,
          center: latLngToWorld(mapCenter),
        };
        mapCanvas.classList.add("dragging");
        mapCanvas.setPointerCapture(event.pointerId);
      };

      const moveMapDrag = (event) => {
        if (!isMapDragging || !dragStart) return;
        const dx = event.clientX - dragStart.x;
        const dy = event.clientY - dragStart.y;
        mapCenter = worldToLatLng({
          x: dragStart.center.x - dx,
          y: dragStart.center.y - dy,
        });
        resizeMap();
      };

      const endMapDrag = (event) => {
        if (!isMapDragging) return;
        isMapDragging = false;
        dragStart = null;
        mapCanvas.classList.remove("dragging");
        if (mapCanvas.hasPointerCapture(event.pointerId)) {
          mapCanvas.releasePointerCapture(event.pointerId);
        }
      };

      asideButton.addEventListener("click", () => {
        aside.classList.toggle("open");
      });

      asideChatButton.addEventListener("click", () => {
        openChatList();
        aside.classList.remove("open");
      });

      chatListButton.addEventListener("click", () => {
        openChatList();
      });

      closeChatListButton.addEventListener("click", () => {
        closeChatList();
      });

      document.querySelectorAll(".chat-room").forEach((roomButton) => {
        roomButton.addEventListener("click", () => {
          const roomStop = BUS_STOP_LOCATION.find(
            (stop) => stop.busStop === roomButton.dataset.room
          );
          if (roomStop) selectedStop = roomStop;
          chatListPage.classList.remove("open");
          messages = [
            ...messages,
            {
              nickname: roomButton.dataset.room,
              text: roomButton.dataset.room + " 채팅방에 입장했습니다.",
            },
          ].slice(-7);
          renderMessages();
          openStationChat(roomStop || selectedStop);
        });
      });

      closeChatPanelButton.addEventListener("click", closeChat);
      zoomInButton.addEventListener("click", () => changeMapZoom(1));
      zoomOutButton.addEventListener("click", () => changeMapZoom(-1));

      mapCanvas.addEventListener("pointerdown", startMapDrag);
      mapCanvas.addEventListener("pointermove", moveMapDrag);
      mapCanvas.addEventListener("pointerup", endMapDrag);
      mapCanvas.addEventListener("pointercancel", endMapDrag);
      mapCanvas.addEventListener("lostpointercapture", () => {
        isMapDragging = false;
        dragStart = null;
        mapCanvas.classList.remove("dragging");
      });

      chatForm.addEventListener("submit", (event) => {
        event.preventDefault();
        const text = messageInput.value.trim();
        if (!text) return;
        messages = [...messages, { nickname: "나", text, mine: true }].slice(-7);
        messageInput.value = "방금 지나간 버스도 보이나요?";
        renderMessages();
        window.setTimeout(addIncomingMessage, 420);
      });

      document.querySelector("#startByStation").addEventListener("click", () => {
        onboarding.classList.remove("open");
      });

      document.querySelector("#startByRoute").addEventListener("click", () => {
        onboarding.classList.remove("open");
      });

      window.addEventListener("resize", resizeMap);

      resizeMap();
      renderMessages();
      window.setInterval(moveDisplayBusPoints, MOVEMENT_INTERVAL_MS);
      window.setInterval(advanceMockBusNodes, MOCK_POLL_INTERVAL_MS);
    </script>
  </body>
</html>
